/**:
  ros__parameters:
    camera_info_url: "package://so101_bringup/config/cameras/cam_overhead_calib_placeholder_720.yaml"
    use_sensor_data_qos: false
    sync_sink: false
    use_gst_timestamps: true
    image_encoding: "rgb8"


/static_camera/cam_overhead:
  ros__parameters:
    frame_id: "cam_overhead"
    camera_name: "cam_overhead"
    camera_info_url: "package://so101_bringup/config/cameras/cam_overhead_calib_placeholder_720.yaml"
    # Higher-resolution RGB stream for small ArUco markers.
    # This UVC device reports MJPG 1280x720 at 30 FPS as a discrete supported mode.
    gscam_config: >
      v4l2src device=/dev/v4l/by-id/usb-Sonix_Technology_Co.__Ltd._USB_2.0_Camera_SN0001-video-index0 io-mode=2 do-timestamp=true !
      image/jpeg,width=1280,height=720,framerate=30/1 !
      jpegdec ! videoconvert
